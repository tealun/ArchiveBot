# ArchiveBot 配置模板
# 复制此文件为 config.yaml 并填写你的值

bot:
  token: "YOUR_BOT_TOKEN_HERE"  # 从 @BotFather 获取
  owner_id: 0  # 你的 Telegram ID，从 @userinfobot 获取
  language: "zh-CN"  # 界面语言: en, zh-CN, zh-TW
  polling_interval: 1  # 轮询间隔（秒）

features:
  auto_tag: true  # 自动生成类型标签
  enable_fts: true  # 启用全文搜索
  enable_ocr: false  # 启用图片OCR识别

ai:
  enabled: false  # 启用AI功能
  auto_summarize: false  # 自动总结新归档内容
  auto_generate_tags: false  # 自动生成AI标签

  # 统一AI配置（推荐）。为避免硬编码密钥，建议通过环境变量设置API密钥
  # 并在 api.api_key_env 中引用环境变量名称
  api:
    provider: openai  # 供应商: openai, claude, gemini, grok 等
    # 推荐使用环境变量名称，例如: ARCHIVEBOT_OPENAI_KEY
    api_key_env: ""  # 例如 ARCHIVEBOT_OPENAI_KEY（推荐）
    # 向后兼容：如果 api_key_env 为空，代码会回退到 api_key（不推荐）
    api_key: ''  # （已废弃）直接配置API密钥 - 避免将密钥提交到配置文件
    api_url: ''  # 自定义API地址（可选）
    model: gpt-3.5-turbo  # 模型: gpt-3.5-turbo, gpt-4, grok-beta 等
    max_tokens: 1000  # 最大token数
    timeout: 30  # 超时时间（秒）

  # 运行时控制和保护措施
  cache_enabled: true            # 启用AI响应缓存以避免重复调用和成本
  cache_path: "data/ai_cache.db" # 缓存数据库路径（sqlite）
  cache_ttl_seconds: 604800      # 缓存有效期（秒），默认7天
  rate_limit_per_minute: 60      # 全局每分钟API调用次数限制
  log_calls: false               # 是否记录AI调用详情（生产环境避免记录完整响应）
  retry_on_failure: 1            # 临时错误重试次数
  auto_summary_on_forward: true  # 转发消息时自动触发摘要（处理器层级）
  auto_tagging: true             # 应用AI生成的标签（可设为false仅生成建议）
  
  # AI聊天模式（交互式对话）
  chat_enabled: false           # 启用短消息自动AI聊天模式
  chat_threshold_chars: 30      # 当用户消息短于此长度时触发聊天模式（排除转发消息）
  chat_session_ttl_seconds: 600 # 会话超时时间（默认10分钟）
  chat_allow_write_ops: false   # 允许AI执行写操作（归档/删除/标签）- 为安全起见保持false
  
  # AI参考内容排除配置（用于AI互动模式的上下文数据过滤）
  exclude_from_context:
    channel_ids: []  # 排除的存档频道ID列表，例如: [-1001234567890, -1009876543210]
    tags: []         # 排除的标签列表，例如: ['私密', '草稿', '临时', '不存档', 'exclude', 'skip']

logging:
  level: "INFO"  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "data/bot.log"  # 日志文件路径
  console: true  # 是否输出到控制台
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

storage:
  database:
    path: "data/archive.db"  # 数据库文件路径
  
  backup:
    auto_interval_hours: 24  # 自动备份间隔（小时），默认24小时
    keep_count: 10           # 保留备份数量，默认保留最近10个
  
  telegram:
    # 向后兼容：旧的单频道配置（可选，如果配置了channels.default则此项被忽略）
    channel_id: 0  # 已废弃，请使用下面的 channels.default
    enabled: true  # 启用Telegram存储
    
    # 新的多频道配置
    channels:
      default: 0      # 默认频道ID（必填，格式: -1001234567890）
      text: 0         # 文本频道（可选，不配置则使用default）
      ebook: 0        # 电子书频道（可选）
      document: 0     # 文档频道（可选）
      image: 0        # 图片频道（可选）
      media: 0        # 媒体频道-视频音频（可选）
    
    # 类型到频道的映射规则
    type_mapping:
      text: text           # 纯文本 → 文本频道
      link: text           # 链接 → 文本频道
      ebook: ebook         # 电子书 → 电子书频道
      document: document   # 文档 → 文档频道
      image: image         # 图片 → 图片频道
      animation: image     # 动画GIF → 图片频道
      sticker: image       # 贴纸 → 图片频道
      video: media         # 视频 → 媒体频道
      audio: media         # 音频 → 媒体频道
      voice: media         # 语音 → 媒体频道
      contact: default     # 联系人 → 默认频道
      location: default    # 位置 → 默认频道
    
    # 来源到频道的映射配置（优先级高于类型映射）
    # 根据转发来源（频道/群组名称或ID）指定存储频道
    # 多个来源可以映射到同一个频道，但一个来源不能映射到多个频道
    source_mapping:
      # 示例：
      # - sources: ['技术频道', '开发群组', -1001234567890]  # 支持名称或ID
      #   channel_id: -1001111111111  # 目标存储频道
      # - sources: ['生活日常']
      #   channel_id: -1002222222222
    
    # 标签到频道的映射配置（优先级最高）
    # 根据消息标签指定存储频道
    # 多个标签可以映射到同一个频道，但一个标签不能映射到多个频道
    tag_mapping:
      # 示例：
      # - tags: ['工作', '项目', '任务']  # 多个标签映射到同一频道
      #   channel_id: -1001111111111
      # - tags: ['学习', '笔记']
      #   channel_id: -1002222222222
    
    # 个人直接发送内容的存储配置（无转发来源时）
    direct_send:
      # 个人直发的频道配置（可选，不配置则使用系统channels）
      channels:
        # 示例（可以配置与系统不同的频道）：
        # default: -1003675667626  # 默认频道
        # text: -1003779168344     # 文本频道
        # ebook: -1003859375248    # 电子书频道
        # document: -1003869785901 # 文档频道
        # image: -1003534777860    # 图片频道
        # media: -1003843636869    # 媒体频道
      
      # 个人直发的类型映射规则（可选，不配置则使用系统type_mapping）
      type_mapping:
        # 示例（与系统type_mapping保持一致）：
        # text: text           # 纯文本 → 文本频道
        # link: text           # 链接 → 文本频道
        # ebook: ebook         # 电子书 → 电子书频道
        # document: document   # 文档 → 文档频道
        # image: image         # 图片 → 图片频道
        # animation: image     # 动画GIF → 图片频道
        # sticker: image       # 贴纸 → 图片频道
        # video: media         # 视频 → 媒体频道
        # audio: media         # 音频 → 媒体频道
        # voice: media         # 语音 → 媒体频道
        # contact: default     # 联系人 → 默认频道
        # location: default    # 位置 → 默认频道
  
  cloud:
    google_drive:
      enabled: false  # 启用Google Drive存储
      client_id: ""  # Google Drive客户端ID
      client_secret: ""  # Google Drive客户端密钥
      folder_name: "ArchiveBot"  # 存储文件夹名称
    
    aliyun:
      enabled: false  # 启用阿里云盘存储
      refresh_token: ""  # 阿里云盘刷新令牌
      folder_name: "归档"  # 存储文件夹名称
