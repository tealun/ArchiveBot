# ArchiveBot Configuration Template
# Copy this file to config.yaml and fill in your values

bot:
  token: "YOUR_BOT_TOKEN_HERE"  # From @BotFather
  owner_id: 0  # Your Telegram ID from @userinfobot
  language: "zh-CN"  # en, zh-CN, zh-TW
  polling_interval: 1

features:
  auto_tag: true  # Auto type tags
  enable_fts: true  # Full-text search
  enable_ocr: false  # OCR for images

ai:
  enabled: false  # Enable AI features
  auto_summarize: false  # Auto summarize new archives (backward compatible with old field names)
  auto_generate_tags: false  # Auto generate AI tags

  # Unified AI configuration (preferred). To avoid hardcoding secrets, set API keys via environment variables
  # and reference the env var name in `api.api_key_env`. Backward-compatibility: existing `api.api_key` is still supported
  api:
    provider: openai  # openai, claude, gemini, grok, etc.
    # Prefer using an environment variable name here. Example: ARCHIVEBOT_OPENAI_KEY
    api_key_env: ""  # e.g. ARCHIVEBOT_OPENAI_KEY (preferred)
    # Backward compatibility: if `api_key_env` is empty, the code may fall back to `api_key` (not recommended)
    api_key: ''  # (deprecated) Direct API key — avoid committing secrets into config files
    api_url: ''  # Custom API URL (optional)
    model: gpt-3.5-turbo  # gpt-3.5-turbo, gpt-4, grok-beta, etc.
    max_tokens: 1000
    timeout: 30

  # Runtime controls and safeguards
  cache_enabled: true            # Enable caching of AI responses to avoid duplicate calls and costs
  cache_path: "data/ai_cache.db" # Path to cache DB (sqlite)
  cache_ttl_seconds: 604800     # Cache TTL in seconds (default 7 days)
  rate_limit_per_minute: 60     # Global approximate API calls per minute
  log_calls: false              # Whether to log AI call details (avoid logging full responses in production)
  retry_on_failure: 1           # Number of retries for transient errors
  auto_summary_on_forward: true # Auto-trigger summary when forwarding messages (handler-level)
  auto_tagging: true            # Apply AI-generated tags (can be set to false to only generate suggestions)
  
  # AI Chat Mode (interactive conversation)
  chat_enabled: false           # Enable automatic AI chat mode for short messages
  chat_threshold_chars: 30      # Trigger chat mode when user message is shorter than this (excludes forwarded messages)
  chat_session_ttl_seconds: 600 # Session timeout (default 10 minutes)
  chat_allow_write_ops: false   # Allow AI to execute write operations (archive/delete/tag) - keep false for safety

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "data/bot.log"
  console: true
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

storage:
  database:
    path: "data/archive.db"
  
  backup:
    auto_interval_hours: 24  # 自动备份间隔（小时），默认24小时
    keep_count: 10           # 保留备份数量，默认保留最近10个
  
  telegram:
    # 向后兼容：旧的单频道配置（可选，如果配置了channels.default则此项被忽略）
    channel_id: 0  # 已废弃，请使用下面的 channels.default
    enabled: true
    
    # 新的多频道配置
    channels:
      default: 0      # 默认频道ID（必填，格式: -1001234567890）
      text: 0         # 文本频道（可选，不配置则使用default）
      ebook: 0        # 电子书频道（可选）
      document: 0     # 文档频道（可选）
      image: 0        # 图片频道（可选）
      media: 0        # 媒体频道-视频音频（可选）
    
    # 类型到频道的映射规则
    type_mapping:
      text: text           # 纯文本 → 文本频道
      link: text           # 链接 → 文本频道
      ebook: ebook         # 电子书 → 电子书频道
      document: document   # 文档 → 文档频道
      image: image         # 图片 → 图片频道
      animation: image     # 动画GIF → 图片频道
      sticker: image       # 贴纸 → 图片频道
      video: media         # 视频 → 媒体频道
      audio: media         # 音频 → 媒体频道
      voice: media         # 语音 → 媒体频道
      contact: default     # 联系人 → 默认频道
      location: default    # 位置 → 默认频道
  
  cloud:
    google_drive:
      enabled: false
      client_id: ""
      client_secret: ""
      folder_name: "ArchiveBot"
    
    aliyun:
      enabled: false
      refresh_token: ""
      folder_name: "归档"
